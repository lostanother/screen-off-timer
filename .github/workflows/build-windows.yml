name: Build Windows exe

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "src/**"
      - "scripts/**"
      - "data/**"
      - "ScreenOffTimer.spec"
      - "requirements-windows.txt"
      - ".github/workflows/build-windows.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-windows.txt

      - name: Generate icons
        run: python scripts/generate_icon.py

      - name: Build exe
        run: pyinstaller --noconfirm ScreenOffTimer.spec

      - name: Verify exe
        shell: pwsh
        run: |
          if (-not (Test-Path dist\ScreenOffTimer.exe)) {
            Write-Error "dist\ScreenOffTimer.exe not found"
            exit 1
          }
          Get-Item dist\ScreenOffTimer.exe | Format-List Name, Length

      - uses: actions/upload-artifact@v4
        with:
          name: ScreenOffTimer-windows
          path: dist/ScreenOffTimer.exe
          retention-days: 90

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ScreenOffTimer-windows
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/ScreenOffTimer.exe

name: Build Windows exe

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-windows.txt

      - name: Generate icons
        run: python scripts/generate_icon.py

      - name: Build exe
        run: pyinstaller --noconfirm ScreenOffTimer.spec

      - uses: actions/upload-artifact@v4
        with:
          name: ScreenOffTimer-windows
          path: dist/ScreenOffTimer.exe
